<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authenticating Session...</title>
    <style>
        html { color-scheme: light dark; } 
    </style>
</head>
<body>
    <div id="status">Verifying link authenticity...</div>

    <script>
        const token = new URLSearchParams(window.location.search).get('token');
        if (!token) {
            document.getElementById('status').innerText = 'Authentication error: Missing token parameter.';
        }
        else {
            fetch('/proxylogin/verify?token=' + encodeURIComponent(token), { method: 'POST' })
                .then(response => {
                    if (response.ok) {
                        window.location.href = '/';
                    }
                    else {
                        return response.text().then(msg => { throw new Error(msg) });
                    }
                })
                .catch(err => {
                    document.getElementById('status').innerHTML = '<span style="color:#fa5252;">Failed: ' + err.message + '</span>';
                });
        }
    </script>
</body>
</html>
