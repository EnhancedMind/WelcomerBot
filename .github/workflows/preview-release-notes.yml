name: Preview Release Notes

on:
  workflow_dispatch:

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: package-version
        uses: martinbeentjes/npm-get-version-action@v1.3.1

      - name: Generate Release Notes Preview
        uses: actions/github-script@v7
        with:
          script: |
            const tagName = `version_${{ steps.package-version.outputs.current-version }}`;
            
            try {
              const response = await github.rest.repos.generateReleaseNotes({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tagName,
                // Optional: target_commitish: 'main' 
              });
              
              core.info("=== GENERATED RELEASE NOTES PREVIEW ===");
              core.info(response.data.body);
              core.info("=======================================");
            } catch (error) {
              core.setFailed(`Failed to generate preview: ${error.message}`);
            }