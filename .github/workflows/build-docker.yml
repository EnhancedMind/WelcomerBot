name: Build and Push Docker Image

on:
  workflow_dispatch: # Allows you to run a standalone build manually from the Actions tab
  workflow_call:      # Allows the release workflow to trigger this build automatically
    inputs:
      version:
        required: false # Standalone runs don't require an input
        type: string

jobs:
  build-platforms:
    name: Build platform-specific images
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: blob:none

      # Prepare Git info, package version, and architecture-specific tags
      - name: Prepare Build Metadata and Tags
        id: prep
        run: |
          REPO_LOWER="${RAW_REPO,,}"
          echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT

          IMAGE_PATH="ghcr.io/${REPO_LOWER}"
          
          if [ -z "${{ inputs.version }}" ]; then
            VERSION_NUM=$(jq -r .version package.json)
            echo "DOCKER_TAGS=${IMAGE_PATH}:latest-dev-${{ matrix.arch }},${IMAGE_PATH}:v${VERSION_NUM}-dev-${{ matrix.arch }}" >> $GITHUB_OUTPUT
          else
            VERSION_NUM="${{ inputs.version }}"
            echo "DOCKER_TAGS=${IMAGE_PATH}:latest-${{ matrix.arch }},${IMAGE_PATH}:v${VERSION_NUM}-${{ matrix.arch }}" >> $GITHUB_OUTPUT
          fi
        env:
          RAW_REPO: ${{ github.repository }}

      # Set up Docker Buildx for multi-architecture building
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Log in to GitHub Container Registry (GHCR)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build natively on the assigned host architecture
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ steps.prep.outputs.DOCKER_TAGS }}
          # Disable attestations to remove unknown/unknown entries
          provenance: false
          sbom: false
          build-args: |
            COMMIT_SHA=${{ steps.prep.outputs.SHA_SHORT }}
            BUILD_NUMBER=${{ steps.prep.outputs.BUILD_NUMBER }}
          # Scoping ensures the amd64 and arm64 caches don't overwrite each other
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.arch }}


  merge-manifests:
    name: Merge platform images into unified multi-arch tag
    needs: build-platforms
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to allow the cleanup action to delete package versions
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # 3. Assemble target multi-arch tags and map their architecture components
      - name: Prepare Merge Metadata
        id: merge-prep
        run: |
          REPO_LOWER="${RAW_REPO,,}"
          echo "PKG_NAME=$(basename "${REPO_LOWER}")" >> $GITHUB_OUTPUT
          
          IMAGE_PATH="ghcr.io/${REPO_LOWER}"
          
          if [ -z "${{ inputs.version }}" ]; then
            VERSION_NUM=$(jq -r .version package.json)
            echo "TARGET_TAGS=-t ${IMAGE_PATH}:latest-dev -t ${IMAGE_PATH}:v${VERSION_NUM}-dev" >> $GITHUB_OUTPUT
            echo "SOURCES=${IMAGE_PATH}:latest-dev-amd64 ${IMAGE_PATH}:latest-dev-arm64" >> $GITHUB_OUTPUT
          else
            VERSION_NUM="${{ inputs.version }}"
            echo "TARGET_TAGS=-t ${IMAGE_PATH}:latest -t ${IMAGE_PATH}:v${VERSION_NUM}" >> $GITHUB_OUTPUT
            echo "SOURCES=${IMAGE_PATH}:latest-amd64 ${IMAGE_PATH}:latest-arm64" >> $GITHUB_OUTPUT
          fi
        env:
          RAW_REPO: ${{ github.repository }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tie the independent tags together into a master multi-architecture manifest
      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create ${{ steps.merge-prep.outputs.TARGET_TAGS }} ${{ steps.merge-prep.outputs.SOURCES }}

      # Clean up old untagged image versions using the marketplace action
      - name: Clean untagged images from GHCR
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          package: ${{ steps.merge-prep.outputs.PKG_NAME }}
          delete-untagged: true