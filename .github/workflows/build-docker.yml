name: Build and Push Docker Image

on:
  workflow_dispatch: # Allows you to run a standalone build manually from the Actions tab
  workflow_call:      # Allows the release workflow to trigger this build automatically
    inputs:
      version:
        required: false # Standalone runs don't require an input
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to allow the cleanup action to delete package versions
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: blob:none

      # 1. Grab the version from package.json if no version input was passed down
      - name: Get version from package.json
        if: "${{ inputs.version == '' }}"
        id: package-version
        uses: martinbeentjes/npm-get-version-action@v1.3.1

      # extract short SHA and absolute total commit count for build metadata
      - name: Generate Build Metadata
        id: meta
        run: |
          echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT

      # 2. Force the entire repository path (Owner/Repo) to lowercase for Docker compliance
      - name: Lowercase repository path
        id: string
        run: |
          echo "REPO_LOWER=${RAW_REPO,,}" >> $GITHUB_OUTPUT

          # Also extract just the package/repo name itself (e.g., welcomerbot) for the cleanup step
          PKG_NAME=$(echo "${RAW_REPO,,}" | cut -d'/' -f2)
          echo "PKG_NAME=${PKG_NAME}" >> $GITHUB_OUTPUT
        env:
          RAW_REPO: ${{ github.repository }}

      # 3. Determine the exact Docker tags based on how this workflow was triggered
      - name: Set dynamic tags
        id: docker-tags
        run: |
          IMAGE_PATH="ghcr.io/${{ steps.string.outputs.REPO_LOWER }}"
          
          if [ -z "${{ inputs.version }}" ]; then
            # Standalone build fallback tags (e.g., ghcr.io/enhancedmind/welcomerbot:latest-dev)
            VERSION_NUM="${{ steps.package-version.outputs.current-version }}"
            echo "TAG_PRIMARY=${IMAGE_PATH}:latest-dev" >> $GITHUB_OUTPUT
            echo "TAG_SECONDARY=${IMAGE_PATH}:v${VERSION_NUM}-dev" >> $GITHUB_OUTPUT
          else
            # Official Release tags passed from release.yml (e.g., ghcr.io/enhancedmind/welcomerbot:latest)
            VERSION_NUM="${{ inputs.version }}"
            echo "TAG_PRIMARY=${IMAGE_PATH}:latest" >> $GITHUB_OUTPUT
            echo "TAG_SECONDARY=${IMAGE_PATH}:v${VERSION_NUM}" >> $GITHUB_OUTPUT
          fi

      # 4. Set up hardware emulation (QEMU) for Raspberry Pi (ARM) compilation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      # 5. Set up Docker Buildx for multi-architecture building
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 6. Log in to GitHub Container Registry (GHCR)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 7. Build the image for standard PC and Raspberry Pi 4, then push to GHCR using the calculated tags
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64, linux/arm64
          tags: |
            ${{ steps.docker-tags.outputs.TAG_PRIMARY }}
            ${{ steps.docker-tags.outputs.TAG_SECONDARY }}
          build-args: |
            COMMIT_SHA=${{ steps.meta.outputs.SHA_SHORT }}
            BUILD_NUMBER=${{ steps.meta.outputs.BUILD_NUMBER }}

      # 8. Clean up old untagged container versions using the marketplace action
      - name: Clean untagged images from GHCR
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          package: ${{ steps.string.outputs.PKG_NAME }}
          delete-untagged: true